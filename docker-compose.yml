services:

  postgres:
    image: postgres:16-alpine
    container_name: traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: traffic_monitor
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./cctv-bogor-api/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./cctv-bogor-api
      dockerfile: Dockerfile
    container_name: traffic_api
    restart: unless-stopped
    env_file: ./cctv-bogor-api/.env
    environment:
      DB_URL: postgresql+asyncpg://traffic_user:${POSTGRES_PASSWORD:-traffic_dev_pass}@postgres:5432/traffic_monitor
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./cctv-bogor-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: traffic_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
